<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>完美收纳大师 - 芒果TV</title>
    <style>
        :root {
            --mango-orange: #FF6A00;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        #game-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 3px #FF6A00;
            background: #FFF8F0;
            touch-action: none;
        }
        canvas {
            display: block;
            cursor: default;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        (function() {
            // ==================== 常量与配置 ====================
            const LOGIC_WIDTH = 400;
            const LOGIC_HEIGHT = 700;
            const MANGO_ORANGE = '#FF6A00';
            const MANGO_ORANGE_RGB = { r: 255, g: 106, b: 0 };
            const CREAM_BG = '#FFF8F0';
            const CREAM_BG_RGB = { r: 255, g: 248, b: 240 };

            // ==================== DOM元素 ====================
            const canvas = document.getElementById('gameCanvas');
            const container = document.getElementById('game-container');
            const ctx = canvas.getContext('2d');

            // ==================== Retina适配 ====================
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = LOGIC_WIDTH * dpr;
            canvas.height = LOGIC_HEIGHT * dpr;
            canvas.style.width = LOGIC_WIDTH + 'px';
            canvas.style.height = LOGIC_HEIGHT + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);

            // ==================== 音效引擎 ====================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        audioCtx = null;
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playTone(freq, duration, type = 'sine', volume = 0.15) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(volume, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + duration);
                } catch (e) {
                    // 静默处理
                }
            }

            function playDragSound() { playTone(440, 0.05, 'sine', 0.1); }

            function playSuccessSound() {
                playTone(880, 0.1, 'sine', 0.15);
                setTimeout(() => playTone(660, 0.08, 'sine', 0.1), 50);
            }

            function playErrorSound() { playTone(220, 0.15, 'square', 0.12); }

            function playCelebrateSound() {
                playTone(523, 0.1, 'sine', 0.18);
                setTimeout(() => playTone(659, 0.1, 'sine', 0.18), 120);
                setTimeout(() => playTone(784, 0.15, 'sine', 0.22), 240);
            }

            function playStarSound() { playTone(1047, 0.06, 'sine', 0.08); }

            // ==================== 游戏状态 ====================
            const STATE = {
                LOADING: 'loading',
                MENU: 'menu',
                PLAYING: 'playing',
                LEVEL_COMPLETE: 'levelComplete',
                ALL_COMPLETE: 'allComplete',
                PAUSED: 'paused'
            };

            let gameState = STATE.MENU;
            let currentLevelIndex = 0;
            let timerSeconds = 0;
            let timerInterval = null;
            let isPaused = false;
            let hintUsed = false;
            let hintTargetId = null;
            let hintStartTime = 0;
            const HINT_DURATION = 3000; // 3秒

            // ==================== 粒子系统 ====================
            let particles = [];

            function spawnParticles(x, y, count = 8) {
                const colors = ['#FF6A00', '#FFD700', '#FF4081', '#00E5FF', '#76FF03', '#FFEA00',
                '#FFFFFF'];
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
                    const speed = 2.5 + Math.random() * 5;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1.0,
                        decay: 0.015 + Math.random() * 0.03,
                        size: 3 + Math.random() * 5,
                        color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    p.vy += 0.05;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    // 绘制小星星形状
                    const cx = p.x;
                    const cy = p.y;
                    const s = p.size;
                    const spikes = 5;
                    const outerR = s;
                    const innerR = s * 0.4;
                    ctx.moveTo(cx, cy - outerR);
                    for (let i = 1; i < spikes * 2; i++) {
                        const r = i % 2 === 0 ? outerR : innerR;
                        const angle = (Math.PI * 2 / (spikes * 2)) * i - Math.PI / 2;
                        ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
                    }
                    ctx.closePath();
                    ctx.fill();
                    // 光晕
                    ctx.globalAlpha = p.life * 0.4;
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(cx, cy, s * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // ==================== 芒果崽类 ====================
            class MangoZai {
                constructor(x, y, scale = 1) {
                    this.baseX = x;
                    this.baseY = y;
                    this.x = x;
                    this.y = y;
                    this.scale = scale;
                    this.floatOffset = 0;
                    this.floatSpeed = 0.03;
                    this.floatAmplitude = 8;
                    this.isCelebrating = false;
                    this.celebrateTimer = 0;
                    this.celebrateDuration = 1.5;
                    this.rotation = 0;
                    this.bounceY = 0;
                }

                update(dt) {
                    if (this.isCelebrating) {
                        this.celebrateTimer += dt;
                        if (this.celebrateTimer > this.celebrateDuration) {
                            this.isCelebrating = false;
                            this.celebrateTimer = 0;
                            this.rotation = 0;
                            this.bounceY = 0;
                        } else {
                            const t = this.celebrateTimer;
                            const freq = 8;
                            this.rotation = Math.sin(t * freq * Math.PI) * 0.35 * (1 - t / this
                                .celebrateDuration);
                            this.bounceY = -Math.abs(Math.sin(t * freq * 0.7 * Math.PI)) * 60 * (1 - t / this
                                .celebrateDuration);
                            this.floatOffset = 0;
                        }
                    } else {
                        this.floatOffset = Math.sin(Date.now() * this.floatSpeed) * this.floatAmplitude;
                        this.rotation = 0;
                        this.bounceY = 0;
                    }
                    this.x = this.baseX;
                    this.y = this.baseY + this.floatOffset + this.bounceY;
                }

                triggerCelebrate() {
                    this.isCelebrating = true;
                    this.celebrateTimer = 0;
                    this.floatOffset = 0;
                }

                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    const s = this.scale;

                    // 身体阴影
                    ctx.fillStyle = 'rgba(0,0,0,0.08)';
                    ctx.beginPath();
                    ctx.ellipse(0, 3 * s, 22 * s, 30 * s, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // 身体 - 芒果形状（圆润椭圆，底部稍尖）
                    const bodyGrad = ctx.createLinearGradient(0, -28 * s, 0, 30 * s);
                    bodyGrad.addColorStop(0, '#FF9A3C');
                    bodyGrad.addColorStop(0.4, '#FF6A00');
                    bodyGrad.addColorStop(0.75, '#FF7B1A');
                    bodyGrad.addColorStop(1, '#E85D00');
                    ctx.fillStyle = bodyGrad;
                    ctx.beginPath();
                    ctx.moveTo(0, -28 * s);
                    ctx.bezierCurveTo(22 * s, -28 * s, 24 * s, -8 * s, 22 * s, 14 * s);
                    ctx.bezierCurveTo(20 * s, 28 * s, 8 * s, 32 * s, 0, 30 * s);
                    ctx.bezierCurveTo(-8 * s, 32 * s, -20 * s, 28 * s, -22 * s, 14 * s);
                    ctx.bezierCurveTo(-24 * s, -8 * s, -22 * s, -28 * s, 0, -28 * s);
                    ctx.closePath();
                    ctx.fill();

                    // 身体高光
                    const highlightGrad = ctx.createLinearGradient(-10 * s, -20 * s, 8 * s, 5 * s);
                    highlightGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
                    highlightGrad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = highlightGrad;
                    ctx.beginPath();
                    ctx.ellipse(-3 * s, -10 * s, 8 * s, 14 * s, -0.3, 0, Math.PI * 2);
                    ctx.fill();

                    // 叶子
                    ctx.fillStyle = '#4CAF50';
                    ctx.beginPath();
                    ctx.moveTo(0, -27 * s);
                    ctx.bezierCurveTo(-6 * s, -38 * s, -16 * s, -42 * s, -18 * s, -36 * s);
                    ctx.bezierCurveTo(-19 * s, -30 * s, -8 * s, -28 * s, 0, -27 * s);
                    ctx.closePath();
                    ctx.fill();
                    // 叶子亮面
                    ctx.fillStyle = '#66BB6A';
                    ctx.beginPath();
                    ctx.moveTo(0, -27 * s);
                    ctx.bezierCurveTo(-4 * s, -34 * s, -10 * s, -38 * s, -12 * s, -34 * s);
                    ctx.bezierCurveTo(-13 * s, -30 * s, -5 * s, -28 * s, 0, -27 * s);
                    ctx.closePath();
                    ctx.fill();
                    // 小叶脉
                    ctx.strokeStyle = '#388E3C';
                    ctx.lineWidth = 0.6 * s;
                    ctx.beginPath();
                    ctx.moveTo(-3 * s, -28 * s);
                    ctx.quadraticCurveTo(-8 * s, -33 * s, -13 * s, -35 * s);
                    ctx.stroke();

                    // 眼睛 - 白色
                    const eyeY = -8 * s;
                    // 左眼
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(-7 * s, eyeY, 8 * s, 0, Math.PI * 2);
                    ctx.fill();
                    // 右眼
                    ctx.beginPath();
                    ctx.arc(7 * s, eyeY, 8 * s, 0, Math.PI * 2);
                    ctx.fill();

                    // 瞳孔
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.arc(-6 * s, eyeY + 1 * s, 3.8 * s, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(8 * s, eyeY + 1 * s, 3.8 * s, 0, Math.PI * 2);
                    ctx.fill();

                    // 眼睛高光
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(-4 * s, eyeY - 2.5 * s, 2 * s, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(10 * s, eyeY - 2.5 * s, 2 * s, 0, Math.PI * 2);
                    ctx.fill();

                    // 微笑
                    ctx.strokeStyle = '#5D3A1A';
                    ctx.lineWidth = 1.8 * s;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.arc(0, eyeY + 3 * s, 9 * s, 0.15 * Math.PI, 0.85 * Math.PI);
                    ctx.stroke();

                    // 腮红
                    ctx.fillStyle = 'rgba(255,150,150,0.5)';
                    ctx.beginPath();
                    ctx.ellipse(-14 * s, eyeY + 6 * s, 5 * s, 3.5 * s, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(14 * s, eyeY + 6 * s, 5 * s, 3.5 * s, 0, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            }

            // ==================== 物品类 ====================
            class Item {
                constructor(id, name, shape, dimensions, color, gradientColors, initX, initY, drawDetails) {
                    this.id = id;
                    this.name = name;
                    this.shape = shape; // 'rect' | 'circle' | 'polygon'
                    this.dimensions = dimensions; // {w, h} for rect, {r} for circle, {vertices: [[x,y],...]} for polygon
                    this.color = color;
                    this.gradientColors = gradientColors || null;
                    this.initX = initX;
                    this.initY = initY;
                    this.x = initX;
                    this.y = initY;
                    this.targetX = 0;
                    this.targetY = 0;
                    this.isPlaced = false;
                    this.isDragging = false;
                    this.drawDetails = drawDetails || {}; // 额外的绘制细节
                    this.scaleBoost = 1.0;
                    this.alpha = 1.0;
                }

                getCenterX() { return this.x; }
                getCenterY() { return this.y; }

                getBounds() {
                    if (this.shape === 'rect') {
                        const w = this.dimensions.w;
                        const h = this.dimensions.h;
                        return { left: this.x - w / 2, top: this.y - h / 2, right: this.x + w / 2, bottom: this
                                .y + h / 2 };
                    } else if (this.shape === 'circle') {
                        const r = this.dimensions.r;
                        return { left: this.x - r, top: this.y - r, right: this.x + r, bottom: this.y + r };
                    } else if (this.shape === 'polygon') {
                        const verts = this.dimensions.vertices;
                        let minX = Infinity,
                            minY = Infinity,
                            maxX = -Infinity,
                            maxY = -Infinity;
                        for (const v of verts) {
                            const vx = this.x + v[0];
                            const vy = this.y + v[1];
                            if (vx < minX) minX = vx;
                            if (vy < minY) minY = vy;
                            if (vx > maxX) maxX = vx;
                            if (vy > maxY) maxY = vy;
                        }
                        return { left: minX, top: minY, right: maxX, bottom: maxY };
                    }
                    return { left: this.x - 15, top: this.y - 15, right: this.x + 15, bottom: this.y + 15 };
                }

                containsPoint(px, py) {
                    if (this.shape === 'rect') {
                        const w = this.dimensions.w / 2;
                        const h = this.dimensions.h / 2;
                        return px >= this.x - w && px <= this.x + w && py >= this.y - h && py <= this.y + h;
                    } else if (this.shape === 'circle') {
                        const r = this.dimensions.r;
                        const dx = px - this.x;
                        const dy = py - this.y;
                        return dx * dx + dy * dy <= r * r;
                    } else if (this.shape === 'polygon') {
                        const verts = this.dimensions.vertices;
                        const n = verts.length;
                        let inside = false;
                        for (let i = 0, j = n - 1; i < n; j = i++) {
                            const xi = this.x + verts[i][0];
                            const yi = this.y + verts[i][1];
                            const xj = this.x + verts[j][0];
                            const yj = this.y + verts[j][1];
                            if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
                                inside = !inside;
                            }
                        }
                        return inside;
                    }
                    return false;
                }

                draw(ctx, isHinted = false) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    const s = this.isDragging ? 1.05 : this.scaleBoost;
                    ctx.scale(s, s);
                    ctx.globalAlpha = this.isDragging ? 0.88 : this.alpha;

                    // 阴影
                    if (!this.isPlaced) {
                        ctx.fillStyle = 'rgba(0,0,0,0.12)';
                        ctx.beginPath();
                        if (this.shape === 'circle') {
                            ctx.arc(2, 2, this.dimensions.r, 0, Math.PI * 2);
                        } else if (this.shape === 'rect') {
                            const w = this.dimensions.w;
                            const h = this.dimensions.h;
                            ctx.roundRect ? ctx.roundRect(-w / 2 + 2, -h / 2 + 2, w, h, 4) : ctx.rect(-w / 2 + 2, -h /
                                2 + 2, w, h);
                        } else {
                            const verts = this.dimensions.vertices;
                            ctx.moveTo(verts[0][0] + 2, verts[0][1] + 2);
                            for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i][0] + 2, verts[i][1] + 2);
                            ctx.closePath();
                        }
                        ctx.fill();
                    }

                    // 主体
                    let fillStyle = this.color;
                    if (this.gradientColors && this.shape === 'rect') {
                        const grad = ctx.createLinearGradient(0, -this.dimensions.h / 2, 0, this.dimensions.h / 2);
                        grad.addColorStop(0, this.gradientColors[0]);
                        grad.addColorStop(1, this.gradientColors[1]);
                        fillStyle = grad;
                    }
                    ctx.fillStyle = fillStyle;

                    if (this.shape === 'rect') {
                        const w = this.dimensions.w;
                        const h = this.dimensions.h;
                        ctx.beginPath();
                        if (ctx.roundRect) {
                            ctx.roundRect(-w / 2, -h / 2, w, h, 5);
                        } else {
                            ctx.rect(-w / 2, -h / 2, w, h);
                        }
                        ctx.fill();
                        // 边框
                        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                        // 高光
                        const hlGrad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
                        hlGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
                        hlGrad.addColorStop(0.5, 'rgba(255,255,255,0)');
                        hlGrad.addColorStop(1, 'rgba(0,0,0,0.05)');
                        ctx.fillStyle = hlGrad;
                        ctx.fill();
                    } else if (this.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.dimensions.r, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                        const hlGrad = ctx.createRadialGradient(-this.dimensions.r * 0.25, -this.dimensions.r * 0.25,
                            this.dimensions.r * 0.1, 0, 0, this.dimensions.r);
                        hlGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
                        hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.fillStyle = hlGrad;
                        ctx.fill();
                    } else if (this.shape === 'polygon') {
                        const verts = this.dimensions.vertices;
                        ctx.beginPath();
                        ctx.moveTo(verts[0][0], verts[0][1]);
                        for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i][0], verts[i][1]);
                        ctx.closePath();
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                    }

                    // 提示高亮
                    if (isHinted) {
                        const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.015);
                        ctx.strokeStyle = `rgba(255,215,0,${0.6 + pulse * 0.4})`;
                        ctx.lineWidth = 3 + pulse * 3;
                        ctx.setLineDash([4, 3]);
                        if (this.shape === 'rect') {
                            const w = this.dimensions.w;
                            const h = this.dimensions.h;
                            ctx.beginPath();
                            ctx.rect(-w / 2 - 3, -h / 2 - 3, w + 6, h + 6);
                            ctx.stroke();
                        } else if (this.shape === 'circle') {
                            ctx.beginPath();
                            ctx.arc(0, 0, this.dimensions.r + 4, 0, Math.PI * 2);
                            ctx.stroke();
                        } else {
                            const verts = this.dimensions.vertices;
                            ctx.beginPath();
                            ctx.moveTo(verts[0][0] - 3, verts[0][1] - 3);
                            for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i][0] - 3, verts[i][1] - 3);
                            ctx.closePath();
                            ctx.stroke();
                        }
                        ctx.setLineDash([]);
                    }

                    // 成功放置后的闪光环
                    if (this.isPlaced && this.scaleBoost > 1.0) {
                        const ringAlpha = (this.scaleBoost - 1.0) * 5;
                        ctx.strokeStyle = `rgba(255,255,255,${Math.min(ringAlpha, 0.8)})`;
                        ctx.lineWidth = 3;
                        if (this.shape === 'rect') {
                            const w = this.dimensions.w + 8;
                            const h = this.dimensions.h + 8;
                            ctx.beginPath();
                            ctx.rect(-w / 2, -h / 2, w, h);
                            ctx.stroke();
                        } else if (this.shape === 'circle') {
                            ctx.beginPath();
                            ctx.arc(0, 0, this.dimensions.r + 5, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }

                    // 绘制物品上的细节
                    if (this.drawDetails && this.drawDetails.type) {
                        this.drawItemDetails(ctx);
                    }

                    ctx.restore();
                }

                drawItemDetails(ctx) {
                    const dd = this.drawDetails;
                    if (dd.type === 'lipstick') {
                        // 金色底座
                        ctx.fillStyle = '#D4A843';
                        const bw = (this.dimensions.w || 16) * 0.7;
                        ctx.fillRect(-bw / 2, (this.dimensions.h || 40) / 2 - 7, bw, 7);
                        ctx.fillStyle = '#C4963A';
                        ctx.fillRect(-bw / 2 + 1, (this.dimensions.h || 40) / 2 - 6, bw - 2, 2);
                    } else if (dd.type === 'eyeshadow') {
                        const w = this.dimensions.w || 34;
                        const h = this.dimensions.h || 24;
                        const cols = ['#F8BBD0', '#CE93D8', '#90CAF9', '#A5D6A7'];
                        const cellW = w / 4 - 1;
                        const cellH = h / 2 - 1;
                        for (let r = 0; r < 2; r++) {
                            for (let c = 0; c < 4; c++) {
                                ctx.fillStyle = cols[(r * 4 + c) % cols.length];
                                ctx.fillRect(-w / 2 + 2 + c * (cellW + 1), -h / 2 + 2 + r * (cellH + 1), cellW,
                                    cellH);
                            }
                        }
                    } else if (dd.type === 'brush') {
                        ctx.fillStyle = '#E8D5C4';
                        ctx.fillRect(-3, -(this.dimensions.h || 44) / 2, 6, (this.dimensions.h || 44) * 0.55);
                        ctx.fillStyle = '#C9A88C';
                        ctx.fillRect(-2.5, -(this.dimensions.h || 44) / 2 + (this.dimensions.h || 44) * 0.55, 5, (
                            this.dimensions.h || 44) * 0.2);
                    } else if (dd.type === 'drink') {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.font = 'bold 7px "PingFang SC","Microsoft YaHei",sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('芒果', 0, 1);
                        // 迷你芒果崽头像
                        ctx.fillStyle = MANGO_ORANGE;
                        ctx.beginPath();
                        ctx.arc(0, -6, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#4CAF50';
                        ctx.beginPath();
                        ctx.moveTo(0, -10);
                        ctx.lineTo(-2, -7);
                        ctx.lineTo(2, -7);
                        ctx.closePath();
                        ctx.fill();
                    } else if (dd.type === 'camera') {
                        ctx.fillStyle = '#333';
                        ctx.fillRect(-6, -3, 12, 8);
                        ctx.fillStyle = '#555';
                        ctx.beginPath();
                        ctx.arc(0, -4, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#222';
                        ctx.beginPath();
                        ctx.arc(0, -4, 3, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (dd.type === 'passport') {
                        ctx.fillStyle = '#1a3a5c';
                        ctx.fillRect(-8, -5, 16, 10);
                        ctx.fillStyle = '#D4A843';
                        ctx.fillRect(-3, -2, 6, 4);
                    }
                }

                reset() {
                    this.x = this.initX;
                    this.y = this.initY;
                    this.isPlaced = false;
                    this.isDragging = false;
                    this.scaleBoost = 1.0;
                    this.alpha = 1.0;
                }

                placeAt(tx, ty) {
                    this.targetX = tx;
                    this.targetY = ty;
                    this.x = tx;
                    this.y = ty;
                    this.isPlaced = true;
                    this.isDragging = false;
                    this.scaleBoost = 1.15;
                }

                update() {
                    if (this.isPlaced && this.scaleBoost > 1.0) {
                        this.scaleBoost += (1.0 - this.scaleBoost) * 0.2;
                        if (Math.abs(this.scaleBoost - 1.0) < 0.002) this.scaleBoost = 1.0;
                    }
                }
            }

            // ==================== 收纳框类（虚线框）====================
            class SlotBox {
                constructor(id, itemId, shape, dimensions, targetX, targetY) {
                    this.id = id;
                    this.itemId = itemId;
                    this.shape = shape;
                    this.dimensions = dimensions;
                    this.targetX = targetX;
                    this.targetY = targetY;
                    this.isOccupied = false;
                }

                getCenterX() { return this.targetX; }
                getCenterY() { return this.targetY; }

                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.targetX, this.targetY);

                    // 半透明填充
                    ctx.fillStyle = this.isOccupied ? 'rgba(180,220,180,0.35)' : 'rgba(200,200,210,0.3)';
                    ctx.setLineDash([7, 3]);
                    ctx.lineDashOffset = Date.now() * 0.03;
                    ctx.strokeStyle = this.isOccupied ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.85)';
                    ctx.lineWidth = 2;

                    if (this.shape === 'rect') {
                        const w = this.dimensions.w;
                        const h = this.dimensions.h;
                        ctx.beginPath();
                        if (ctx.roundRect) {
                            ctx.roundRect(-w / 2, -h / 2, w, h, 5);
                        } else {
                            ctx.rect(-w / 2, -h / 2, w, h);
                        }
                        ctx.fill();
                        ctx.stroke();
                    } else if (this.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.dimensions.r, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    } else if (this.shape === 'polygon') {
                        const verts = this.dimensions.vertices;
                        ctx.beginPath();
                        ctx.moveTo(verts[0][0], verts[0][1]);
                        for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i][0], verts[i][1]);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    }

                    // 图标提示
                    if (!this.isOccupied) {
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.setLineDash([]);
                        const iconSize = Math.min(
                            this.shape === 'circle' ? this.dimensions.r * 0.6 :
                            this.shape === 'rect' ? Math.min(this.dimensions.w, this.dimensions.h) * 0.35 :
                            10,
                            14
                        );
                        ctx.beginPath();
                        ctx.arc(0, 0, iconSize * 0.7, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(180,180,190,0.7)';
                        ctx.beginPath();
                        ctx.arc(0, -iconSize * 0.1, iconSize * 0.35, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.setLineDash([]);
                    ctx.restore();
                }
            }

            const levelBuilders = [buildLevel1, buildLevel2, buildLevel3];
            let currentLevelData = null;

            function loadLevel(index) {
                currentLevelData = levelBuilders[index]();
                currentLevelIndex = index;
                timerSeconds = 0;
                isPaused = false;
                hintUsed = false;
                hintTargetId = null;
                hintStartTime = 0;
                particles = [];
                // 重置所有物品
                for (const item of currentLevelData.items) {
                    item.reset();
                }
                // 重置所有虚线框
                for (const slot of currentLevelData.slots) {
                    slot.isOccupied = false;
                }
                // 随机微调物品初始位置避免完全重叠
                randomizeItemPositions();
                gameState = STATE.PLAYING;
                startTimer();
            }

            function randomizeItemPositions() {
                const items = currentLevelData.items;
                const occupiedRects = [];
                for (const item of items) {
                    let attempts = 0;
                    let placed = false;
                    while (attempts < 30 && !placed) {
                        const bx = item.initX + (Math.random() - 0.5) * 40;
                        const by = item.initY + (Math.random() - 0.5) * 30;
                        const bxMin = Math.max(25, Math.min(375, bx));
                        const byMin = Math.max(70, Math.min(330, by));
                        const bounds = item.getBounds();
                        const testRect = {
                            left: bxMin - (bounds.right - bounds.left) / 2,
                            top: byMin - (bounds.bottom - bounds.top) / 2,
                            right: bxMin + (bounds.right - bounds.left) / 2,
                            bottom: byMin + (bounds.bottom - bounds.top) / 2,
                        };
                        let overlaps = false;
                        for (const or of occupiedRects) {
                            if (!(testRect.right < or.left || testRect.left > or.right ||
                                    testRect.bottom < or.top || testRect.top > or.bottom)) {
                                overlaps = true;
                                break;
                            }
                        }
                        if (!overlaps) {
                            item.initX = bxMin;
                            item.initY = byMin;
                            item.x = bxMin;
                            item.y = byMin;
                            item.isPlaced = false;
                            occupiedRects.push(testRect);
                            placed = true;
                        }
                        attempts++;
                    }
                    if (!placed) {
                        item.x = item.initX;
                        item.y = item.initY;
                        const bounds = item.getBounds();
                        occupiedRects.push({
                            left: item.x - (bounds.right - bounds.left) / 2,
                            top: item.y - (bounds.bottom - bounds.top) / 2,
                            right: item.x + (bounds.right - bounds.left) / 2,
                            bottom: item.y + (bounds.bottom - bounds.top) / 2,
                        });
                    }
                }
            }

            // ==================== 计时器 ====================
            function startTimer() {
                stopTimer();
                timerInterval = setInterval(() => {
                    if (!isPaused && gameState === STATE.PLAYING) {
                        timerSeconds++;
                    }
                }, 1000);
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }

            function getStars(seconds) {
                if (seconds <= 20) return 3;
                if (seconds <= 40) return 2;
                return 1;
            }

            // ==================== 拖拽管理 ====================
            let dragItem = null;
            let dragOffsetX = 0;
            let dragOffsetY = 0;
            let isDragging = false;
            let mouseX = 0;
            let mouseY = 0;

            function getCanvasPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = LOGIC_WIDTH / rect.width;
                const scaleY = LOGIC_HEIGHT / rect.height;
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else if (e.changedTouches && e.changedTouches.length > 0) {
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            function findItemAt(px, py) {
                if (!currentLevelData) return null;
                const items = currentLevelData.items;
                // 从后往前查找（上层优先）
                for (let i = items.length - 1; i >= 0; i--) {
                    const item = items[i];
                    if (!item.isPlaced && item.containsPoint(px, py)) {
                        return item;
                    }
                }
                return null;
            }

            function handlePointerDown(e) {
                initAudio();
                if (gameState === STATE.PAUSED) {
                    // 点击暂停遮罩恢复
                    isPaused = false;
                    gameState = STATE.PLAYING;
                    return;
                }
                if (gameState === STATE.LEVEL_COMPLETE) {
                    // 通关后点击进入下一关
                    if (currentLevelIndex < 2) {
                        loadLevel(currentLevelIndex + 1);
                    } else {
                        gameState = STATE.ALL_COMPLETE;
                        stopTimer();
                        mangoZai.triggerCelebrate();
                        playCelebrateSound();
                    }
                    return;
                }
                if (gameState === STATE.ALL_COMPLETE) {
                    // 全部通关后点击重新开始
                    gameState = STATE.MENU;
                    return;
                }
                if (gameState === STATE.MENU) {
                    loadLevel(0);
                    return;
                }
                if (gameState !== STATE.PLAYING) return;
                if (isPaused) return;

                const pos = getCanvasPos(e);
                mouseX = pos.x;
                mouseY = pos.y;
                const item = findItemAt(pos.x, pos.y);
                if (item && !item.isPlaced) {
                    dragItem = item;
                    dragOffsetX = item.x - pos.x;
                    dragOffsetY = item.y - pos.y;
                    item.isDragging = true;
                    isDragging = true;
                    playDragSound();
                }
                e.preventDefault();
            }

            function handlePointerMove(e) {
                const pos = getCanvasPos(e);
                mouseX = pos.x;
                mouseY = pos.y;
                if (isDragging && dragItem) {
                    dragItem.x = pos.x + dragOffsetX;
                    dragItem.y = pos.y + dragOffsetY;
                    // 限制在画布内
                    dragItem.x = Math.max(10, Math.min(LOGIC_WIDTH - 10, dragItem.x));
                    dragItem.y = Math.max(10, Math.min(LOGIC_HEIGHT - 10, dragItem.y));
                }
                e.preventDefault();
            }

            function handlePointerUp(e) {
                if (!isDragging || !dragItem) {
                    isDragging = false;
                    dragItem = null;
                    return;
                }
                const item = dragItem;
                item.isDragging = false;
                isDragging = false;
                dragItem = null;

                // 检测是否匹配虚线框
                let bestSlot = null;
                let bestDist = Infinity;
                const itemCx = item.getCenterX();
                const itemCy = item.getCenterY();

                for (const slot of currentLevelData.slots) {
                    if (slot.isOccupied) continue;
                    if (slot.itemId !== item.id) continue;
                    const slotCx = slot.getCenterX();
                    const slotCy = slot.getCenterY();
                    const dist = Math.sqrt((itemCx - slotCx) ** 2 + (itemCy - slotCy) ** 2);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestSlot = slot;
                    }
                }

                if (bestSlot && bestDist < 20) {
                    // 归位成功
                    item.placeAt(bestSlot.targetX, bestSlot.targetY);
                    bestSlot.isOccupied = true;
                    playSuccessSound();
                    spawnParticles(bestSlot.targetX, bestSlot.targetY, 8);
                    // 检查是否全部归位
                    checkLevelComplete();
                } else {
                    // 归位失败，弹回
                    item.x = item.initX;
                    item.y = item.initY;
                    playErrorSound();
                }
                e.preventDefault();
            }

            function checkLevelComplete() {
                const allPlaced = currentLevelData.slots.every(s => s.isOccupied);
                if (allPlaced) {
                    stopTimer();
                    const stars = getStars(timerSeconds);
                    currentLevelData.stars = stars;
                    gameState = STATE.LEVEL_COMPLETE;
                    mangoZai.triggerCelebrate();
                    playCelebrateSound();
                    // 保存成绩
                    if (!currentLevelData.completedTime) {
                        currentLevelData.completedTime = timerSeconds;
                    }
                }
            }

            // ==================== 事件监听 ====================
            canvas.addEventListener('mousedown', handlePointerDown);
            canvas.addEventListener('mousemove', handlePointerMove);
            canvas.addEventListener('mouseup', handlePointerUp);
            canvas.addEventListener('mouseleave', handlePointerUp);
            canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
            canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
            canvas.addEventListener('touchend', handlePointerUp);
            canvas.addEventListener('touchcancel', handlePointerUp);

            // 窗口失去焦点暂停计时
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && gameState === STATE.PLAYING && !isPaused) {
                    isPaused = true;
                }
            });

            // ==================== 芒果崽实例 ====================
            const mangoZai = new MangoZai(50, 38, 0.75);

            // ==================== UI绘制函数 ====================
            function drawTopBar(ctx) {
                // 顶部信息栏背景
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.beginPath();
                ctx.roundRect ? ctx.roundRect(0, 0, LOGIC_WIDTH, 56, 0) : ctx.rect(0, 0, LOGIC_WIDTH, 56);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,106,0,0.08)';
                ctx.fillRect(0, 54, LOGIC_WIDTH, 2);

                // 关卡名
                ctx.fillStyle = MANGO_ORANGE;

            function drawStar(ctx, cx, cy, size, fillColor, strokeColor) {
                ctx.fillStyle = fillColor;
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 2;
                ctx.beginPath();
                const spikes = 5;
                const outerR = size;
                const innerR = size * 0.4;
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const angle = (Math.PI * 2 / (spikes * 2)) * i - Math.PI / 2;
                    const px = cx + Math.cos(angle) * r;
                    const py = cy + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

                ctx.arc(trophyX + 24, trophyY - 5, 12, Math.PI / 2, -Math.PI / 2);

                ctx.stroke();

            function drawSceneDecoration(ctx) {
                if (!currentLevelData) return;
                const dt = currentLevelData.decorationType;
                ctx.save();
                ctx.globalAlpha = 0.35;

                if (dt === 'dressingTable') {
                    // 化妆镜
                    ctx.fillStyle = '#E8D5C4';
                    ctx.beginPath();
                    ctx.ellipse(LOGIC_WIDTH / 2, 380, 110, 60, 0, Math.PI, 0);
                    ctx.fill();
                    ctx.strokeStyle = '#C9A88C';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // 灯光点
                    for (let i = 0; i < 12; i++) {
                        const angle = Math.PI + (Math.PI / 11) * i;
                        const lx = LOGIC_WIDTH / 2 + Math.cos(angle) * 105;
                        const ly = 380 + Math.sin(angle) * 55;
                        ctx.fillStyle = '#FFE082';
                        ctx.beginPath();
                        ctx.arc(lx, ly, 4, 0, Math.PI * 2);
                        ctx.fill();

                    // "化妆台"文字
                    ctx.fillStyle = '#C9A88C';
                    ctx.font = 'italic 12px "PingFang SC","Microsoft YaHei",sans-serif';
                    ctx.textAlign = 'center';

                } else if (dt === 'suitcase') {
                    // 行李箱外壳
                    ctx.fillStyle = '#5C8DB5';
                    ctx.beginPath();
                    ctx.roundRect ? ctx.roundRect(40, 375, 320, 230, 18) : ctx.rect(40, 375, 320, 230);
                    ctx.fill();
                    ctx.strokeStyle = '#3D6A8A';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    // 箱体中线
                    ctx.strokeStyle = '#3D6A8A';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(LOGIC_WIDTH / 2, 375);
                    ctx.lineTo(LOGIC_WIDTH / 2, 605);
                    ctx.stroke();
                    // 把手
                    ctx.fillStyle = '#3D6A8A';
                    ctx.fillRect(LOGIC_WIDTH / 2 - 25, 368, 50, 10);
                    ctx.fillRect(LOGIC_WIDTH / 2 - 8, 360, 16, 22);
                } else if (dt === 'fridge') {
                    // 冰箱内部
                    ctx.fillStyle = '#E8F4E8';
                    ctx.fillRect(30, 375, 340, 240);
                    ctx.strokeStyle = '#B0C8B0';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(30, 375, 340, 240);
                    // 层架
                    for (let ly = 448; ly < 600; ly += 52) {
                        ctx.strokeStyle = '#C8DCC8';
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([3, 2]);
                        ctx.beginPath();
                        ctx.moveTo(35, ly);
                        ctx.lineTo(365, ly);

            function drawClutterZoneLabel(ctx) {
                ctx.save();

                ctx.save();
                ctx.globalAlpha = 0.3;

                ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'center';

            // ==================== 主循环 ====================
            let lastTime = 0;

            function gameLoop(timestamp) {
                const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.1) : 0.016;
                lastTime = timestamp;

                // 更新
                mangoZai.update(dt);
                updateParticles();

                if (currentLevelData && gameState === STATE.PLAYING && !isPaused) {
                    for (const item of currentLevelData.items) {
                        item.update();
                    }
                }

                // 提示闪烁计时
                if (hintTargetId && hintUsed) {
                    if (Date.now() - hintStartTime > HINT_DURATION) {
                        hintTargetId = null;
                    }
                }

                // 绘制
                ctx.clearRect(0, 0, LOGIC_WIDTH, LOGIC_HEIGHT);

                // 背景
                const bgColor = currentLevelData ? currentLevelData.bgColor : CREAM_BG;
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, LOGIC_WIDTH, LOGIC_HEIGHT);

                // 场景装饰
                if (gameState === STATE.PLAYING || gameState === STATE.PAUSED) {
                    drawSceneDecoration(ctx);
                }

                // 杂乱区标签
                if (gameState === STATE.PLAYING && currentLevelData) {
                    drawClutterZoneLabel(ctx);
                    drawTargetZoneLabel(ctx);
                }

                // 绘制虚线框
                if (currentLevelData && (gameState === STATE.PLAYING || gameState === STATE.PAUSED ||
                        gameState === STATE.LEVEL_COMPLETE)) {
                    for (const slot of currentLevelData.slots) {
                        slot.draw(ctx);
                    }
                }

                // 绘制物品（先绘制已放置的，再绘制未放置的）
                if (currentLevelData && (gameState === STATE.PLAYING || gameState === STATE.PAUSED ||
                        gameState === STATE.LEVEL_COMPLETE)) {
                    // 未放置的
                    for (const item of currentLevelData.items) {
                        if (!item.isPlaced && item !== dragItem) {
                            const isHinted = hintTargetId === item.id;
                            item.draw(ctx, isHinted);
                        }
                    }
                    // 正在拖拽的
                    if (dragItem && dragItem.isDragging) {
                        dragItem.draw(ctx, false);
                    }
                    // 已放置的
                    for (const item of currentLevelData.items) {
                        if (item.isPlaced) {
                            item.draw(ctx, false);
                        }
                    }
                }

                // 粒子
                drawParticles(ctx);

                // 芒果崽
                if (gameState === STATE.PLAYING || gameState === STATE.PAUSED || gameState === STATE.LEVEL_COMPLETE) {
                    mangoZai.draw(ctx);
                }

                // 顶部栏
                if (currentLevelData && (gameState === STATE.PLAYING || gameState === STATE.PAUSED)) {
                    drawTopBar(ctx);
                    drawBottomBar(ctx);
                }

                // 暂停遮罩
                if (isPaused && gameState === STATE.PAUSED) {
                    drawPauseOverlay(ctx);
                }

                // 通关结算
                if (gameState === STATE.LEVEL_COMPLETE && currentLevelData) {
                    drawLevelCompleteOverlay(ctx);
                    // 芒果崽在结算界面也要显示
                    mangoZai.baseX = LOGIC_WIDTH / 2;
                    mangoZai.baseY = 140;
                    mangoZai.scale = 0.85;
                    mangoZai.draw(ctx);
                    mangoZai.baseX = 50;
                    mangoZai.baseY = 38;
                    mangoZai.scale = 0.75;
                }

                // 全部通关
                if (gameState === STATE.ALL_COMPLETE) {
                    drawAllCompleteScreen(ctx);
                }

                // 主菜单
                if (gameState === STATE.MENU) {
                    drawMainMenu(ctx);
                }

                requestAnimationFrame(gameLoop);
            }

            // ==================== 暂停按钮点击处理 ====================
            function handleCanvasClickForUI(e) {
                const pos = getCanvasPos(e);
                const px = pos.x;
                const py = pos.y;

                if (gameState === STATE.MENU) {
                    initAudio();
                    loadLevel(0);
                    return;
                }

                if (gameState === STATE.ALL_COMPLETE) {
                    gameState = STATE.MENU;
                    currentLevelData = null;
                    timerSeconds = 0;
                    stopTimer();
                    return;
                }

                if (gameState === STATE.LEVEL_COMPLETE && currentLevelData && currentLevelData._completeClickArea) {
                    if (currentLevelIndex < 2) {
                        loadLevel(currentLevelIndex + 1);
                    } else {
                        gameState = STATE.ALL_COMPLETE;
                        stopTimer();
                        mangoZai.triggerCelebrate();
                        playCelebrateSound();
                    }
                    return;
                }

                if (gameState === STATE.PAUSED) {
                    isPaused = false;
                    gameState = STATE.PLAYING;
                    return;
                }

                if (gameState !== STATE.PLAYING || !currentLevelData) return;

                // 检查暂停按钮
                const pauseRect = currentLevelData._pauseBtnRect;
                if (pauseRect) {
                    const dist = Math.sqrt((px - pauseRect.cx) ** 2 + (py - pauseRect.cy) ** 2);
                    if (dist <= pauseRect.r + 3) {
                        isPaused = !isPaused;
                        gameState = isPaused ? STATE.PAUSED : STATE.PLAYING;
                        return;
                    }
                }

                // 检查重试按钮
                const retryRect = currentLevelData._retryBtnRect;
                if (retryRect) {
                    const dist = Math.sqrt((px - retryRect.cx) ** 2 + (py - retryRect.cy) ** 2);
                    if (dist <= retryRect.r + 3) {
                        loadLevel(currentLevelIndex);
                        return;
                    }
                }

                // 检查提示按钮
                const hintRect = currentLevelData._hintBtnRect;
                if (hintRect && !hintUsed) {
                    const dist = Math.sqrt((px - hintRect.cx) ** 2 + (py - hintRect.cy) ** 2);
                    if (dist <= hintRect.r + 3) {
                        // 找一个未归位的物品
                        const unplaced = currentLevelData.items.filter(it => !it.isPlaced);
                        if (unplaced.length > 0) {
                            const target = unplaced[Math.floor(Math.random() * unplaced.length)];
                            hintTargetId = target.id;
                            hintUsed = true;
                            hintStartTime = Date.now();
                            playStarSound();
                        }
                        return;
                    }
                }
            }

            // 将UI点击与拖拽事件合并处理
            const originalHandlePointerDown = handlePointerDown;
            handlePointerDown = function(e) {
                initAudio();
                const pos = getCanvasPos(e);
                const px = pos.x;
                const py = pos.y;

                // 先检查UI元素
                if (gameState === STATE.MENU) {
                    gameState = STATE.MENU;
                    handleCanvasClickForUI(e);
                    return;
                }
                if (gameState === STATE.ALL_COMPLETE) {
                    handleCanvasClickForUI(e);
                    return;
                }
                if (gameState === STATE.LEVEL_COMPLETE) {
                    handleCanvasClickForUI(e);
                    return;
                }
                if (gameState === STATE.PAUSED) {
                    handleCanvasClickForUI(e);
                    return;
                }

                // 检查暂停按钮
                if (currentLevelData && currentLevelData._pauseBtnRect) {
                    const pr = currentLevelData._pauseBtnRect;
                    if (Math.sqrt((px - pr.cx) ** 2 + (py - pr.cy) ** 2) <= pr.r + 3) {
                        handleCanvasClickForUI(e);
                        return;
                    }
                }
                // 检查重试按钮
                if (currentLevelData && currentLevelData._retryBtnRect) {
                    const rr = currentLevelData._retryBtnRect;
                    if (Math.sqrt((px - rr.cx) ** 2 + (py - rr.cy) ** 2) <= rr.r + 3) {
                        handleCanvasClickForUI(e);
                        return;
                    }
                }
                // 检查提示按钮
                if (currentLevelData && currentLevelData._hintBtnRect && !hintUsed) {
                    const hr = currentLevelData._hintBtnRect;
                    if (Math.sqrt((px - hr.cx) ** 2 + (py - hr.cy) ** 2) <= hr.r + 3) {
                        handleCanvasClickForUI(e);
                        return;
                    }
                }

                // 否则进行拖拽
                originalHandlePointerDown(e);
            };

            // ==================== 初始化 ====================
            function init() {
                currentLevelData = null;
                gameState = STATE.MENU;
                timerSeconds = 0;
                isPaused = false;
                hintUsed = false;
                hintTargetId = null;
                particles = [];
                dragItem = null;
                isDragging = false;
                stopTimer();
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }

            // ==================== 启动游戏 ====================
            init();

            console.log('🎮 完美收纳大师 - 芒果TV小游戏已就绪');
            console.log('🍊 品牌色: #FF6A00 | 芒果崽已上线');
            console.log('📦 3个关卡: 乘风化妆台 | 花儿与少年旅行箱 | 蘑菇屋冰箱');
            console.log('🖱️ 支持鼠标拖拽和触摸操作');
            console.log('✨ 祝您在"马栏山杯"比赛中取得好成绩！');
        })();
    </script>
